<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>App Ocorrências</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{font-family:Arial;background:#f0f4f8;padding:10px}
h2{color:#003A8F}

input,select{
padding:6px;margin:4px;width:160px;
border:1px solid #ccc;border-radius:5px
}

button{
padding:8px 12px;margin:5px;
border:none;border-radius:6px;
background:#003A8F;color:#fff;
font-weight:bold;cursor:pointer
}

.card{
background:#fff;padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-top:10px
}

.linha{
padding:6px;border-bottom:1px solid #eee;
font-size:13px;
display:flex;justify-content:space-between;align-items:center
}

.botoes{
display:flex;gap:5px
}

.editar{background:orange}
.excluir{background:red}

.bolinha{
width:10px;height:10px;border-radius:50%;
display:inline-block;margin-right:6px
}

.vermelho{background:#e53935}
.laranja{background:#fb8c00}
.verde{background:#43a047}

.horas{color:red;font-weight:bold;margin-left:5px}

#tela2{display:none}

.titulo{text-align:center;font-size:20px;color:#003A8F;font-weight:bold}
.dataTopo{text-align:center;font-size:11px;color:#666;margin-bottom:10px}

.cards{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.cardResumo{
flex:1;background:#e6f0ff;padding:10px;
border-radius:8px;text-align:center;font-size:13px
}

.rodape{text-align:center;margin-top:10px;font-weight:bold;font-size:11px}
</style>
</head>

<body>

<div id="tela1">

<h2>Cadastro</h2>

<input id="oc" placeholder="Ocorrência">
<input id="eq" placeholder="Equipe">

<select id="st">
<option>TRABALHANDO</option>
<option>EM ESPERA</option>
<option>FINALIZADA</option>
</select>

<input id="ci" type="number" placeholder="CI">

<select id="utd">
<option>GOIANA</option>
<option>PAULISTA</option>
<option>CAMARAGIBE</option>
<option>TIMBAÚBA</option>
<option>CARPINA</option>
</select>

<br>
<label>Data/Hora:</label>
<input id="dataOc" type="datetime-local">

<br>
<button id="btnAdd" onclick="add()">Adicionar</button>
<button onclick="limpar()">Limpar Tudo</button>
<button onclick="visualizar()">Visualizar</button>

<div id="lista" class="card"></div>

</div>

<div id="tela2">
<button onclick="voltar()">Voltar</button>
<button onclick="gerar()">Gerar Imagem</button>
<div id="relatorio" class="card"></div>
</div>

<script>

let dados=[];
let editIndex=null;

function carregar(){
let salvo=localStorage.getItem("dadosOcorrencias");
if(salvo){
dados=JSON.parse(salvo);
render();
}
}

function salvar(){
localStorage.setItem("dadosOcorrencias",JSON.stringify(dados));
}

function add(){
if(!oc.value || !eq.value || !ci.value || !dataOc.value)
return alert("Preencha tudo");

if(Number(ci.value)<0) return alert("CI inválido");

let item={
oc:oc.value,
eq:eq.value,
st:st.value,
ci:Number(ci.value),
utd:utd.value,
data:dataOc.value
};

if(editIndex===null){
dados.push(item);
}else{
dados[editIndex]=item;
editIndex=null;
btnAdd.innerText="Adicionar";
}

limparCampos();
salvar();
render();
}

function editar(i){
let d=dados[i];
oc.value=d.oc;
eq.value=d.eq;
st.value=d.st;
ci.value=d.ci;
utd.value=d.utd;
dataOc.value=d.data;

editIndex=i;
btnAdd.innerText="Atualizar";
}

function limparCampos(){
oc.value="";
eq.value="";
ci.value="";
dataOc.value="";
}

function limpar(){
if(!confirm("Apagar tudo?")) return;
dados=[];
salvar();
render();
}

function excluir(i){
dados.splice(i,1);
salvar();
render();
}

function render(){
lista.innerHTML=dados.map((d,i)=>`
<div class="linha">
<span>${d.oc} - ${d.eq} - ${d.st}</span>
<div class="botoes">
<button class="editar" onclick="editar(${i})">Editar</button>
<button class="excluir" onclick="excluir(${i})">X</button>
</div>
</div>
`).join('');
}

function cor(s){
if(s=="EM ESPERA") return "vermelho";
if(s=="TRABALHANDO") return "laranja";
return "verde";
}

function horasDecorridas(data){
let inicio=new Date(data);
let agora=new Date();
let diff=(agora-inicio)/(1000*60*60);
if(diff<0) return "0.0";
return diff.toFixed(1);
}

function ordenar(lista){
return lista.sort((a,b)=>{
let o={"TRABALHANDO":1,"EM ESPERA":2,"FINALIZADA":3};
return o[a.st]-o[b.st];
});
}

function visualizar(){

let listaOrdenada=ordenar([...dados]);

let totalCI=0;
let totalOc=listaOrdenada.length;

let statusCount={TRABALHANDO:0,"EM ESPERA":0,FINALIZADA:0};

listaOrdenada.forEach(d=>{
if(d.st=="TRABALHANDO"||d.st=="EM ESPERA"){
totalCI+=d.ci;
}
statusCount[d.st]++;
});

let dataAtual=new Date().toLocaleString();

relatorio.innerHTML=`
<div class="titulo">ACOMPANHAMENTO-TP-LV-EPs</div>
<div class="dataTopo">${dataAtual}</div>

${listaOrdenada.map(d=>`
<div class="linha">
<span class="bolinha ${cor(d.st)}"></span>
${d.oc} | ${d.eq} | ${d.st} | CI:${d.ci} | ${d.utd} |
${new Date(d.data).toLocaleString()}
<span class="horas">(${horasDecorridas(d.data)}h)</span>
</div>
`).join('')}

<div class="cards">
<div class="cardResumo"><b>Total Ocorrências</b><br>${totalOc}</div>
<div class="cardResumo"><b>CI</b><br>${totalCI}</div>
<div class="cardResumo"><b>Trabalhando</b><br>${statusCount["TRABALHANDO"]}</div>
<div class="cardResumo"><b>Em Espera</b><br>${statusCount["EM ESPERA"]}</div>
<div class="cardResumo"><b>Finalizada</b><br>${statusCount["FINALIZADA"]}</div>
</div>

<div class="rodape">Manutenção, UTEP Setor Norte</div>
`;

tela1.style.display="none";
tela2.style.display="block";
}

function voltar(){
tela1.style.display="block";
tela2.style.display="none";
}

function gerar(){
html2canvas(relatorio,{scale:2}).then(canvas=>{
let link=document.createElement('a');
link.download="relatorio.png";
link.href=canvas.toDataURL();
link.click();
});
}

carregar();

</script>

</body>
</html>
