<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>App Ocorrências</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Arial;
background:#f0f4f8;
padding:8px;
margin:0;
}

h2{
color:#003A8F;
font-size:22px;
}

input,select{
padding:8px;
margin:4px;
width:160px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
padding:8px 12px;
margin:5px;
border:none;
border-radius:6px;
background:#003A8F;
color:#fff;
font-weight:bold;
cursor:pointer;
font-size:12px;
}

.card{
background:#fff;
padding:12px;
border-radius:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-top:10px;
overflow:hidden;
}

#tela2{
display:none;
}

.titulo{
text-align:center;
font-size:18px;
font-weight:bold;
color:#003A8F;
margin-top:5px;
}

.dataTopo{
text-align:center;
font-size:10px;
color:#666;
margin-bottom:12px;
}

.tabela{
width:100%;
}

.linha{
display:grid;
grid-template-columns:
1.3fr
1fr
1.2fr
0.7fr
0.8fr
0.8fr
1fr;
gap:4px;
padding:7px 3px;
border-bottom:1px solid #eee;
font-size:10px;
align-items:center;
text-align:center;
}

.topoTabela{
background:#003A8F;
color:#fff;
font-weight:bold;
border-radius:6px;
font-size:9px;
}

.horas{
color:red;
font-weight:bold;
}

.statusAzul{
color:#1565c0;
font-weight:bold;
}

.statusLaranja{
color:#fb8c00;
font-weight:bold;
}

.statusVermelho{
color:#e53935;
font-weight:bold;
}

.statusVerde{
color:#43a047;
font-weight:bold;
}

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:6px;
margin-top:14px;
}

.cardResumo{
background:#e6f0ff;
padding:10px;
border-radius:12px;
text-align:center;
font-size:11px;
font-weight:bold;
min-height:60px;

display:flex;
flex-direction:column;
justify-content:center;
}

.rodape{
text-align:center;
margin-top:12px;
font-size:11px;
font-weight:bold;
}

.listaItem{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
font-size:12px;
}

.botoes{
display:flex;
gap:5px;
}

.editar{
background:orange;
}

.excluir{
background:red;
}

@media(min-width:700px){

.cards{
grid-template-columns:repeat(4,1fr);
}

.linha{
font-size:12px;
}

.topoTabela{
font-size:11px;
}

}

</style>

</head>

<body>

<div id="tela1">

<h2>Cadastro</h2>

<input id="oc" placeholder="Ocorrência">

<input id="eq" list="listaEquipes" placeholder="Equipe">

<datalist id="listaEquipes">
<option value="ENG1022">
<option value="ENG1023">
<option value="ENG1024">
<option value="ENG1025">
<option value="ENG1026">
<option value="ENG1027">
<option value="ENG1028">
<option value="ENG1029">
<option value="ENG1030">
<option value="ENG1031">
<option value="ENG1032">
<option value="ENG1033">
<option value="ENG1034">
<option value="ENG1035">
<option value="ENG2012">
<option value="ENG2013">
<option value="ENG2014">
<option value="ENG2015">
<option value="ENG2016">
<option value="ENG2017">
<option value="ENG2018">
<option value="ENG2019">
<option value="ENG2020">
<option value="ENG2022">
<option value="ENG5003">
<option value="SEM EQUIPE">
</datalist>

<select id="st">
<option>TRABALHANDO</option>
<option>DESLOCAMENTO</option>
<option>EM ESPERA</option>
<option>FINALIZADA</option>
</select>

<input id="ci" type="number" placeholder="CI">

<select id="utd">
<option>GOIANA</option>
<option>PAULISTA</option>
<option>CAMARAGIBE</option>
<option>TIMBAÚBA</option>
<option>CARPINA</option>
</select>

<br>

<label>Data/Hora:</label>

<input id="dataOc" type="datetime-local">

<br>

<button id="btnAdd" onclick="add()">Adicionar</button>

<button onclick="limpar()">Limpar Tudo</button>

<button onclick="visualizar()">Visualizar</button>

<div id="lista" class="card"></div>

</div>

<div id="tela2">

<button onclick="voltar()">Voltar</button>

<button onclick="gerar()">Gerar Imagem</button>

<div id="relatorio" class="card"></div>

</div>

<script>

const URL_SCRIPT =
"https://script.google.com/macros/s/AKfycbxoi65giqjzjjkHGXstVI6eu9bsjcLAT0uxCnSPWO__UcNRrFR7UMAxPO90C75GQ7rcEw/exec";

let dados=[];
let editIndex=null;

const processos={
ENG1022:"OBRA",
ENG1023:"MANUTENÇÃO",
ENG1024:"OBRA",
ENG1025:"OBRA",
ENG1026:"OBRA",
ENG1027:"MANUTENÇÃO",
ENG1028:"OBRA",
ENG1029:"OBRA",
ENG1030:"OBRA",
ENG1031:"OBRA",
ENG1032:"MANUTENÇÃO",
ENG1033:"OBRA",
ENG1034:"OBRA",
ENG1035:"OBRA",
ENG2012:"OBRA",
ENG2013:"OBRA",
ENG2014:"OBRA",
ENG2015:"OBRA",
ENG2016:"OBRA",
ENG2017:"OBRA",
ENG2018:"OBRA",
ENG2019:"OBRA",
ENG2020:"OBRA",
ENG2022:"OBRA",
ENG5003:"MANUTENÇÃO"
};

const bases={
ENG1022:"CARPINA",
ENG1023:"CARPINA",
ENG1024:"CARPINA",
ENG1025:"CARPINA",
ENG1026:"CARPINA",
ENG1027:"CARPINA",
ENG1028:"IGARASSU",
ENG1029:"CARPINA",
ENG1030:"CARPINA",
ENG1031:"CARPINA",
ENG1032:"CARPINA",
ENG1033:"IGARASSU",
ENG1034:"IGARASSU",
ENG1035:"IGARASSU",
ENG2012:"CARPINA",
ENG2013:"CARPINA",
ENG2014:"CARPINA",
ENG2015:"CARPINA",
ENG2016:"CARPINA",
ENG2017:"CARPINA",
ENG2018:"CARPINA",
ENG2019:"CARPINA",
ENG2020:"IGARASSU",
ENG2022:"CARPINA",
ENG5003:"CARPINA"
};

async function carregar(){

try{

const resposta =
await fetch(URL_SCRIPT);

dados =
await resposta.json();

render();

}catch(erro){

console.log(erro);

}

}

function salvar(){

localStorage.setItem(
"dadosOcorrencias",
JSON.stringify(dados)
);

}

function gerarNumeroOcorrencia(numero){

let agora=new Date();

let ano=agora.getFullYear();

let mes=String(
agora.getMonth()+1
).padStart(2,"0");

return `${ano}_${mes}_${numero}`;

}

function classeStatus(status){

if(status=="TRABALHANDO")
return "statusAzul";

if(status=="DESLOCAMENTO")
return "statusLaranja";

if(status=="EM ESPERA")
return "statusVermelho";

return "statusVerde";

}

async function enviarParaPlanilha(item){

try{

await fetch(URL_SCRIPT,{

method:"POST",

body:JSON.stringify(item)

});

}catch(erro){

console.log(erro);

}

}

async function add(){

if(!oc.value ||
!eq.value ||
!ci.value ||
!dataOc.value)

return alert("Preencha tudo");

let item={

id:
editIndex===null
? Date.now()
: dados[editIndex].id,

oc:oc.value,
eq:eq.value,
st:st.value,
ci:Number(ci.value),
utd:utd.value,
data:dataOc.value

};

if(editIndex===null){

dados.push(item);

}else{

dados[editIndex]=item;

editIndex=null;

btnAdd.innerText="Adicionar";

}

await enviarParaPlanilha(item);

limparCampos();

salvar();

await carregar();

render();

}

function editar(i){

let d=dados[i];

oc.value=d.oc;
eq.value=d.eq;
st.value=d.st;
ci.value=d.ci;
utd.value=d.utd;
dataOc.value=d.data;

editIndex=i;

btnAdd.innerText="Atualizar";

}

function limparCampos(){

oc.value="";
eq.value="";
ci.value="";
dataOc.value="";

}

function limpar(){

if(!confirm("Apagar tudo?"))
return;

dados=[];

localStorage.removeItem(
"dadosOcorrencias"
);

render();

}

function excluir(i){

dados.splice(i,1);

salvar();

render();

}

function horasDecorridas(data,status){

if(status=="FINALIZADA")
return "0.0";

let inicio=new Date(data);

let agora=new Date();

let diff=
(agora-inicio)/(1000*60*60);

return diff.toFixed(1);

}

function ordenar(lista){

return lista.sort((a,b)=>{

let ordem={
"TRABALHANDO":1,
"DESLOCAMENTO":2,
"EM ESPERA":3,
"FINALIZADA":4
};

return ordem[a.st]-ordem[b.st];

});

}

function render(){

lista.innerHTML=
dados.map((d,i)=>`

<div class="listaItem">

<div>

<b>
${gerarNumeroOcorrencia(d.oc)}
</b>

<br>

${d.eq}

</div>

<div class="botoes">

<button class="editar"
onclick="editar(${i})">

Editar

</button>

<button class="excluir"
onclick="excluir(${i})">

X

</button>

</div>

</div>

`).join('');

}

function visualizar(){

let listaOrdenada=
ordenar([...dados]);

let totalCI=0;

let totalOc=
listaOrdenada.length;

let statusCount={
TRABALHANDO:0,
DESLOCAMENTO:0,
"EM ESPERA":0,
FINALIZADA:0
};

let processoCount={};

let baseCount={};

listaOrdenada.forEach(d=>{

if(d.st!="FINALIZADA"){
totalCI += Number(d.ci);
}

statusCount[d.st]++;

let processo=processos[d.eq];

if(processo){

if(!processoCount[processo]){
processoCount[processo]=0;
}

processoCount[processo]++;

}

let base=bases[d.eq];

if(base){

if(!baseCount[base]){
baseCount[base]=0;
}

baseCount[base]++;

}

});

let dataAtual=
new Date().toLocaleString();

relatorio.innerHTML=`

<div class="titulo">
ACOMPANHAMENTO-TP-LV-EPs
</div>

<div class="dataTopo">
${dataAtual}
</div>

<div class="tabela">

<div class="linha topoTabela">

<div>OC</div>
<div>Equipe</div>
<div>Status</div>
<div>CI</div>
<div>UTD</div>
<div>Tempo</div>
<div>Dt Solic.</div>

</div>

${listaOrdenada.map(d=>`

<div class="linha">

<div>
${gerarNumeroOcorrencia(d.oc)}
</div>

<div>${d.eq}</div>

<div class="${classeStatus(d.st)}">
${d.st}
</div>

<div>
${d.st=="FINALIZADA"
? "-"
: d.ci}
</div>

<div>${d.utd}</div>

<div class="horas">
${horasDecorridas(
d.data,
d.st
)}h
</div>

<div>
${new Date(d.data)
.toLocaleDateString()}
</div>

</div>

`).join('')}

</div>

<div class="cards">

<div class="cardResumo">
Total OCs
<br><br>
${totalOc}
</div>

<div class="cardResumo">
CI Total
<br><br>
${totalCI}
</div>

<div class="cardResumo">
OCs Em Execução
<br><br>
${statusCount["TRABALHANDO"]}
</div>

<div class="cardResumo">
OCs Em Deslocamento
<br><br>
${statusCount["DESLOCAMENTO"]}
</div>

<div class="cardResumo">
OCs Em Espera
<br><br>
${statusCount["EM ESPERA"]}
</div>

<div class="cardResumo">
OCs Finalizadas
<br><br>
${statusCount["FINALIZADA"]}
</div>

<div class="cardResumo">
TP-Obra
<br><br>
${processoCount["OBRA"] || 0}
</div>

<div class="cardResumo">
TP-Manutenção
<br><br>
${processoCount["MANUTENÇÃO"] || 0}
</div>

<div class="cardResumo">
Base Carp.
<br><br>
${baseCount["CARPINA"] || 0}
</div>

<div class="cardResumo">
Base Igara.
<br><br>
${baseCount["IGARASSU"] || 0}
</div>

</div>

<div class="rodape">
Manutenção, UTEP Setor Norte
</div>

`;

tela1.style.display="none";
tela2.style.display="block";

}

function voltar(){

tela1.style.display="block";
tela2.style.display="none";

}

function gerar(){

window.scrollTo(0,0);

html2canvas(relatorio,{
scale:3,
useCORS:true
}).then(canvas=>{

let link=
document.createElement('a');

link.download=
"relatorio.png";

link.href=
canvas.toDataURL("image/png");

link.click();

});

}

carregar();

</script>

</body>

</html>
